<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOIR — Food Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-400: #aaaaaa;
      --gray-600: #666666;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ececea;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grain overlay on background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* Background decorative circles */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,0,0,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── iPhone 17 Pro Frame ─────────────────────────────── */
    .device-wrap {
      position: relative;
      z-index: 1;
      animation: deviceEntry 0.8s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    @keyframes deviceEntry {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .phone {
      width: 393px;
      height: 852px;
      border-radius: 56px;
      background: #1c1c1e;
      position: relative;
      /* Titanium-style multi-ring border */
      box-shadow:
        inset 0 0 0 1px #3a3a3c,
        0 0 0 1px #2c2c2e,
        0 0 0 2px #1c1c1e,
        0 0 0 3px #3a3a3c,
        /* Depth shadows */
        0 50px 100px -20px rgba(0,0,0,0.55),
        0 30px 60px -10px rgba(0,0,0,0.35),
        0 10px 20px rgba(0,0,0,0.2);
    }

    /* Left side buttons — volume */
    .btn-vol {
      position: absolute;
      left: -4px;
      width: 4px;
      background: #2c2c2e;
      border-radius: 2px 0 0 2px;
      box-shadow: inset 0 0 0 0.5px #444;
    }
    .btn-vol-up   { top: 142px; height: 34px; }
    .btn-vol-down { top: 190px; height: 34px; }
    .btn-mute     { top: 110px; height: 22px; }

    /* Right side button — power */
    .btn-power {
      position: absolute;
      right: -4px;
      top: 168px;
      width: 4px;
      height: 68px;
      background: #2c2c2e;
      border-radius: 0 2px 2px 0;
      box-shadow: inset 0 0 0 0.5px #444;
    }

    /* Screen */
    .screen {
      position: absolute;
      inset: 3px;
      border-radius: 53px;
      background: var(--white);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 36px;
      background: var(--black);
      border-radius: 20px;
      z-index: 20;
    }

    /* Subtle camera dot inside dynamic island */
    .dynamic-island::after {
      content: '';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1a1a2e;
      box-shadow: inset 0 0 0 2px #0d0d1a;
    }

    /* ─── Status Bar ─────────────────────────────────────── */
    .status-bar {
      height: 56px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 10px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: var(--black);
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ─── Scrollable Login Content ───────────────────────── */
    .login-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .login-scroll::-webkit-scrollbar { display: none; }

    .login-content {
      padding: 16px 32px 36px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    /* ─── Logo ───────────────────────────────────────────── */
    .logo-mark {
      width: 56px;
      height: 56px;
      background: var(--black);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .app-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 10px;
      color: var(--black);
      line-height: 1;
      margin-bottom: 8px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .app-tagline {
      font-size: 10.5px;
      color: var(--gray-400);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 44px;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    /* ─── Form ───────────────────────────────────────────── */
    .form-fields {
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 9px;
    }

    .form-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 0;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--black);
      background: transparent;
      outline: none;
      transition: border-color 0.25s ease;
      -webkit-appearance: none;
    }

    .form-input::placeholder { color: #d0d0d0; }

    .form-input:focus {
      border-bottom-color: var(--black);
    }

    /* Eye icon for password */
    .input-wrap {
      position: relative;
    }

    .eye-btn {
      position: absolute;
      right: 0;
      bottom: 10px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--gray-400);
    }

    /* ─── Forgot ─────────────────────────────────────────── */
    .forgot-row {
      text-align: right;
      margin-top: 4px;
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.35s ease both;
    }

    .forgot-row a {
      font-size: 11px;
      color: var(--gray-400);
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: color 0.2s;
    }
    .forgot-row a:hover { color: var(--black); }

    /* ─── CTA Button ─────────────────────────────────────── */
    .btn-login {
      width: 100%;
      height: 54px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 28px;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s 0.38s ease both;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
    }

    .btn-login:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    /* ─── Divider ────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.42s ease both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .divider-text {
      font-size: 10px;
      color: #c4c4c4;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ─── Social Buttons ─────────────────────────────────── */
    .social-btns {
      display: flex;
      gap: 12px;
      margin-bottom: 36px;
      animation: fadeUp 0.5s 0.46s ease both;
    }

    .btn-social {
      flex: 1;
      height: 50px;
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 400;
      color: var(--black);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
      letter-spacing: 0.1px;
    }

    .btn-social:active {
      background: var(--gray-100);
      transform: scale(0.97);
    }

    /* ─── Sign up ────────────────────────────────────────── */
    .signup-row {
      text-align: center;
      font-size: 12.5px;
      color: var(--gray-400);
      margin-top: auto;
      padding-top: 8px;
      animation: fadeUp 0.5s 0.5s ease both;
    }

    .signup-row a {
      color: var(--black);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid var(--black);
      padding-bottom: 1px;
    }

    /* ─── Home Indicator ─────────────────────────────────── */
    .home-indicator {
      position: absolute;
      bottom: 9px;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 5px;
      background: var(--black);
      border-radius: 3px;
      opacity: 0.18;
      z-index: 10;
    }

    /* ─── Animations ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Background label ───────────────────────────────── */
    .bg-label {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.25);
      z-index: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="device-wrap">
    <div class="phone">
      <!-- Side buttons -->
      <div class="btn-mute btn-vol"></div>
      <div class="btn-vol-up btn-vol"></div>
      <div class="btn-vol-down btn-vol"></div>
      <div class="btn-power"></div>

      <div class="screen">
        <!-- Dynamic Island -->
        <div class="dynamic-island"></div>

        <!-- Status Bar -->
        <div class="status-bar">
          <span class="status-time">9:41</span>
          <div class="status-icons">
            <!-- Signal bars -->
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
              <rect x="0"   y="6" width="3" height="6" rx="1"   fill="#0a0a0a"/>
              <rect x="5"   y="4" width="3" height="8" rx="1"   fill="#0a0a0a"/>
              <rect x="10"  y="1" width="3" height="11" rx="1"  fill="#0a0a0a"/>
              <rect x="15"  y="0" width="3" height="12" rx="1"  fill="#0a0a0a" opacity="0.25"/>
            </svg>
            <!-- WiFi -->
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <path d="M8 9.5C8.83 9.5 9.5 10.17 9.5 11S8.83 12.5 8 12.5 6.5 11.83 6.5 11 7.17 9.5 8 9.5Z" fill="#0a0a0a"/>
              <path d="M4.5 7.2C5.5 6.1 6.7 5.5 8 5.5s2.5.6 3.5 1.7" stroke="#0a0a0a" stroke-width="1.3" stroke-linecap="round" fill="none"/>
              <path d="M1.8 4.5C3.4 2.7 5.6 1.5 8 1.5s4.6 1.2 6.2 3" stroke="#0a0a0a" stroke-width="1.3" stroke-linecap="round" fill="none"/>
            </svg>
            <!-- Battery -->
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
              <rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="#0a0a0a" stroke-opacity="0.35"/>
              <rect x="2"   y="2"   width="17"  height="8"  rx="2"   fill="#0a0a0a"/>
              <path d="M24 4v4c1-.4 1.5-.9 1.5-2S25 4.4 24 4Z" fill="#0a0a0a" opacity="0.4"/>
            </svg>
          </div>
        </div>

        <!-- Scrollable content -->
        <div class="login-scroll">
          <div class="login-content">

            <!-- Logo mark -->
            <div class="logo-mark">
              <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Fork left -->
                <line x1="9"  y1="4"  x2="9"  y2="12" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
                <line x1="9"  y1="12" x2="9"  y2="26" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
                <line x1="7"  y1="4"  x2="7"  y2="9"  stroke="white" stroke-width="1.6" stroke-linecap="round"/>
                <line x1="11" y1="4"  x2="11" y2="9"  stroke="white" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M7 9 Q9 12 11 9" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                <!-- Knife / spoon right -->
                <path d="M20 4 C22 4 24 6 24 10 C24 13 22 14.5 21 15 L21 26" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
              </svg>
            </div>

            <!-- App name -->
            <div class="app-name">NOIR</div>
            <div class="app-tagline">Fine dining, delivered.</div>

            <!-- Form fields -->
            <div class="form-fields">
              <div class="form-group">
                <label class="form-label">Email address</label>
                <div class="input-wrap">
                  <input type="email" class="form-input" placeholder="you@example.com">
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrap">
                  <input type="password" class="form-input" placeholder="••••••••" id="pwd">
                  <button class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">
                    <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <!-- Forgot password -->
            <div class="forgot-row">
              <a href="#">Forgot password?</a>
            </div>

            <!-- Login button -->
            <button class="btn-login">Sign In</button>

            <!-- Divider -->
            <div class="divider">
              <div class="divider-line"></div>
              <span class="divider-text">or continue with</span>
              <div class="divider-line"></div>
            </div>

            <!-- Social -->
            <div class="social-btns">
              <button class="btn-social">
                <!-- Google G -->
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#0a0a0a"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#333"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#555"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#777"/>
                </svg>
                Google
              </button>

              <button class="btn-social">
                <!-- Apple logo -->
                <svg width="15" height="18" viewBox="0 0 814 1000" fill="#0a0a0a">
                  <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-43.4-150.3-109.8l-5.8-9.8c-50.5-76.7-90.4-199.2-90.4-315.7 0-204.8 133.4-312.9 264.4-312.9 70.1 0 128.4 46.3 172.2 46.3 42.5 0 109.2-49 188.7-49 30.4 0 130.4 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
                </svg>
                Apple
              </button>
            </div>

            <!-- Sign up link -->
            <div class="signup-row">
              New to NOIR? <a href="#">Create account</a>
            </div>

          </div>
        </div>

        <!-- Home indicator -->
        <div class="home-indicator"></div>
      </div><!-- /screen -->
    </div><!-- /phone -->
  </div><!-- /device-wrap -->

  <div class="bg-label">NOIR &mdash; Food Delivery</div>

  <script>
    function togglePwd() {
      const p = document.getElementById('pwd');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    // Ripple effect on login button
    document.querySelector('.btn-login').addEventListener('click', function(e) {
      const btn = this;
      const ripple = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `
        position:absolute;width:${size}px;height:${size}px;
        top:${e.clientY - rect.top - size/2}px;
        left:${e.clientX - rect.left - size/2}px;
        border-radius:50%;background:rgba(255,255,255,0.15);
        transform:scale(0);animation:ripple 0.5s ease-out;
        pointer-events:none;
      `;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);
    });

    // CSS for ripple
    const style = document.createElement('style');
    style.textContent = `@keyframes ripple{to{transform:scale(2.5);opacity:0}}`;
    document.head.appendChild(style);
  </script>
</body>
</html>
