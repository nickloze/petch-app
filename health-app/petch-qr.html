<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petch — Scan to open</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #BEEDFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      background: white;
      border-radius: 36px;
      padding: 40px 36px 36px;
      max-width: 380px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      box-shadow: 0 8px 40px rgba(15, 189, 255, 0.25), 0 2px 8px rgba(0,0,0,0.08);
    }

    .badge {
      background: #BEEDFF;
      color: #0FBDFF;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 36px;
      font-weight: 900;
      color: #0a0a0a;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      margin-bottom: 28px;
      text-align: center;
    }

    .qr-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin-bottom: 24px;
    }

    .qr-wrap svg {
      width: 240px;
      height: 240px;
      border-radius: 20px;
    }

    /* Cat badge overlaid on QR centre */
    .cat-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      background: white;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 4px;
    }

    .cat-badge svg {
      width: 40px;
      height: 40px;
      border-radius: 0;
    }

    .url {
      font-size: 12px;
      font-weight: 700;
      color: #0FBDFF;
      background: #BEEDFF;
      padding: 8px 20px;
      border-radius: 999px;
      margin-bottom: 24px;
      word-break: break-all;
      text-align: center;
    }

    .steps {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0FBDFF;
      color: white;
      font-size: 13px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step p {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      line-height: 1.3;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #f0f0f0;
      margin: 20px 0;
    }

    .print-btn {
      margin-top: 16px;
      padding: 10px 28px;
      background: #0FBDFF;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    @media print {
      body { background: white; padding: 0; }
      .card { box-shadow: none; }
      .print-btn { display: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">SLEEP HEALTH APP</div>
    <h1>Petch</h1>
    <p class="tagline">Your personal sleep companion</p>

      </svg>

    <div class="url">petch-health-app.vercel.app</div>

    <div class="divider"></div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <p>Open your phone camera and point it at the QR code</p>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <p>Tap the notification banner that appears</p>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <p>Explore your personalised sleep journey with Petch!</p>
      </div>
    </div>

    <button class="print-btn" onclick="window.print()">🖨 Print / Save as PDF</button>
  </div>
</body>
</html>
